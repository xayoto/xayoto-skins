<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>xayoto skins hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #1a1a2e, #0f0f1a);
      color: white;
    }

    header {
      padding: 25px;
      text-align: center;
      font-size: 32px;
      font-weight: bold;
      background: rgba(20,20,40,0.8);
      backdrop-filter: blur(10px);
      box-shadow: 0 0 20px rgba(108,92,231,0.5);
    }

    .container {
      padding: 20px;
      max-width: 1400px;
      margin: auto;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    input {
      padding: 12px;
      width: 260px;
      border-radius: 12px;
      border: none;
      outline: none;
    }

    .filter-btn {
      padding: 10px 15px;
      border-radius: 10px;
      border: none;
      background: #2c2c54;
      color: white;
      cursor: pointer;
    }

    .filter-btn.active {
      background: #6c5ce7;
      box-shadow: 0 0 10px rgba(108,92,231,0.8);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 25px;
    }

    .card {
      position: relative;
      border-radius: 20px;
      overflow: hidden;
      cursor: pointer;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 15px;
      opacity: 0;
      transition: 0.3s;
    }

    .card:hover .overlay {
      opacity: 1;
    }

    .title {
      font-size: 20px;
      margin-bottom: 10px;
    }

    .btn {
      display: inline-block;
      padding: 8px 12px;
      border-radius: 10px;
      background: #6c5ce7;
      color: white;
      text-decoration: none;
      font-size: 14px;
      box-shadow: 0 0 10px rgba(108,92,231,0.8);
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      display: none;
      align-items: center;
      justify-content: center;
    }

    .modal img {
      max-width: 80%;
      border-radius: 20px;
    }
  </style>
</head>
<body>

<header>xayoto skins hub</header>

<div class="container">

  <div class="controls">
    <input type="text" id="search" placeholder="Search skins...">
    <button class="filter-btn active" data-filter="ALL">All</button>
    <button class="filter-btn" data-filter="DT">DT</button>
    <button class="filter-btn" data-filter="HD">HD</button>
    <button class="filter-btn" data-filter="NM">NM</button>
  </div>

  <div class="grid" id="skins"></div>

</div>

<div class="modal" id="modal">
  <img id="modalImg">
</div>

<script>
let skins = [];
let currentFilter = "ALL";

const container = document.getElementById('skins');
const modal = document.getElementById('modal');
const modalImg = document.getElementById('modalImg');

// load JSON
fetch('skins.json')
  .then(res => res.json())
  .then(data => {
    skins = data;
    render();
  });

function render() {
  const searchValue = document.getElementById('search').value.toLowerCase();

  const filtered = skins.filter(skin => {
    const matchesSearch = skin.name.toLowerCase().includes(searchValue);
    const matchesFilter = currentFilter === "ALL" || skin.category === currentFilter;
    return matchesSearch && matchesFilter;
  });

  container.innerHTML = "";

  filtered.forEach(skin => {
    const card = document.createElement('div');
    card.className = 'card';

    card.innerHTML = `
      <img src="${skin.preview}">
      <div class="overlay">
        <div class="title">${skin.name}</div>
        <a class="btn" href="${skin.download}" target="_blank">Download</a>
      </div>
    `;

    card.addEventListener('click', () => {
      modal.style.display = 'flex';
      modalImg.src = skin.preview;
    });

    container.appendChild(card);
  });
}

// search

document.getElementById('search').addEventListener('input', render);

// filters

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    render();
  });
});

// modal close

modal.addEventListener('click', () => {
  modal.style.display = 'none';
});

</script>

</body>
</html>
