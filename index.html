<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>xayoto skins hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:        #0b0814;
      --surface:   #110d1e;
      --card:      #160f28;
      --border:    rgba(140,90,255,0.18);
      --p1:        #8c5aff;
      --p2:        #b47fff;
      --p3:        #5a2eb5;
      --glow:      rgba(140,90,255,0.35);
      --text:      #e8deff;
      --muted:     #7a6d99;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── noise overlay ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    /* ── ambient blobs ── */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      pointer-events: none;
      z-index: 0;
      animation: drift 12s ease-in-out infinite alternate;
    }
    .blob-1 { width: 500px; height: 500px; background: rgba(90,46,181,0.25); top: -150px; left: -100px; animation-delay: 0s; }
    .blob-2 { width: 400px; height: 400px; background: rgba(140,90,255,0.15); bottom: 100px; right: -80px; animation-delay: -6s; }

    @keyframes drift {
      from { transform: translate(0,0) scale(1); }
      to   { transform: translate(30px,40px) scale(1.05); }
    }

    /* ── header ── */
    header {
      position: relative;
      z-index: 10;
      padding: 48px 32px 36px;
      text-align: center;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-size: clamp(28px, 5vw, 52px);
      font-weight: 800;
      letter-spacing: -1px;
      background: linear-gradient(120deg, #fff 0%, var(--p2) 50%, var(--p1) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .logo span {
      color: var(--p1);
      -webkit-text-fill-color: var(--p1);
    }

    .tagline {
      margin-top: 8px;
      color: var(--muted);
      font-size: 14px;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    /* ── divider ── */
    .divider {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, var(--p3), var(--p1), var(--p3));
      margin: 16px auto 0;
      border-radius: 2px;
    }

    /* ── grid ── */
    .container {
      position: relative;
      z-index: 10;
      padding: 0 24px 64px;
      max-width: 1440px;
      margin: auto;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 28px;
    }

    /* ── card ── */
    .card {
      position: relative;
      border-radius: 20px;
      overflow: hidden;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--card);
      transition: transform 0.35s cubic-bezier(.22,.68,0,1.2), box-shadow 0.35s ease, border-color 0.3s;
      animation: fadeUp 0.5s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card:hover {
      transform: translateY(-8px) scale(1.01);
      box-shadow: 0 20px 60px rgba(90,46,181,0.35), 0 0 0 1px var(--p1);
      border-color: var(--p1);
    }

    .card-img-wrap {
      overflow: hidden;
      position: relative;
      height: 200px;
    }

    .card-img-wrap::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 40%, rgba(11,8,20,0.9) 100%);
      pointer-events: none;
    }

    .card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.5s ease;
    }

    .card:hover img {
      transform: scale(1.06);
    }

    /* broken image fallback */
    .card img[data-error="true"] {
      display: none;
    }
    .img-fallback {
      display: none;
      width: 100%;
      height: 100%;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--p3), #200a40);
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 1px;
    }
    .card img[data-error="true"] ~ .img-fallback {
      display: flex;
    }

    .card-body {
      padding: 16px 18px 20px;
    }

    .card-name {
      font-family: 'Syne', sans-serif;
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-cat {
      display: inline-block;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--p2);
      background: rgba(140,90,255,0.12);
      border: 1px solid rgba(140,90,255,0.25);
      border-radius: 6px;
      padding: 2px 8px;
      margin-bottom: 14px;
    }

    .dl-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 10px 16px;
      border-radius: 12px;
      border: 1px solid var(--p1);
      background: linear-gradient(135deg, rgba(140,90,255,0.18), rgba(90,46,181,0.25));
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.25s, box-shadow 0.25s, transform 0.15s;
      justify-content: center;
    }

    .dl-btn:hover {
      background: linear-gradient(135deg, rgba(140,90,255,0.35), rgba(90,46,181,0.45));
      box-shadow: 0 0 20px var(--glow);
      transform: translateY(-1px);
    }

    .dl-btn svg {
      flex-shrink: 0;
    }

    /* ── empty state ── */
    .empty {
      grid-column: 1/-1;
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
      font-family: 'Syne', sans-serif;
      font-size: 18px;
    }

    /* ── modal ── */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(5,3,12,0.85);
      backdrop-filter: blur(12px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 20px;
    }

    .modal.open {
      display: flex;
      animation: fadeIn 0.25s ease forwards;
    }

    .modal.closing {
      display: flex;
      animation: fadeOut 0.25s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @keyframes fadeOut {
      from { opacity: 1; }
      to   { opacity: 0; }
    }

    .modal-inner {
      position: relative;
      max-width: 820px;
      width: 100%;
      border-radius: 24px;
      overflow: hidden;
      border: 1px solid var(--border);
      box-shadow: 0 40px 120px rgba(90,46,181,0.5);
      animation: popIn 0.3s cubic-bezier(.22,.68,0,1.2);
    }

    .modal.closing .modal-inner {
      animation: popOut 0.25s cubic-bezier(.4,0,1,1) forwards;
    }

    @keyframes popIn {
      from { transform: scale(0.88); opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }

    @keyframes popOut {
      from { transform: scale(1);    opacity: 1; }
      to   { transform: scale(0.88); opacity: 0; }
    }

    .modal-inner img {
      width: 100%;
      display: block;
    }

    .modal-close {
      position: absolute;
      top: 14px;
      right: 14px;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: rgba(11,8,20,0.8);
      color: var(--text);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    .modal-close:hover { background: var(--p3); }

    /* ── count badge ── */
    .count {
      text-align: center;
      margin-bottom: 24px;
      color: var(--muted);
      font-size: 13px;
      letter-spacing: 1px;
    }

    .count strong {
      color: var(--p2);
      font-weight: 600;
    }
  </style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<header>
  <div class="logo">xayoto <span>skins</span> hub</div>
  <div class="tagline">last updated 18.03.2026</div>
  <div class="divider"></div>
</header>

<div class="container">
  <p class="count" id="count"></p>
  <div class="grid" id="skins"></div>
</div>

<div class="modal" id="modal">
  <div class="modal-inner">
    <button class="modal-close" id="modalClose">✕</button>
    <img id="modalImg" alt="">
  </div>
</div>

<script>
  const container = document.getElementById('skins');
  const modal     = document.getElementById('modal');
  const modalImg  = document.getElementById('modalImg');
  const count     = document.getElementById('count');

  fetch('skins.json')
    .then(r => r.json())
    .then(data => {
      count.innerHTML = `<strong>${data.length}</strong> skins available`;
      render(data);
    })
    .catch(() => {
      container.innerHTML = '<div class="empty">Failed to load skins.</div>';
    });

  function render(skins) {
    if (!skins.length) {
      container.innerHTML = '<div class="empty">No skins found.</div>';
      return;
    }

    container.innerHTML = '';

    skins.forEach((skin, i) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.style.animationDelay = `${i * 0.07}s`;

      // fix download link for google drive view links
      let dlUrl = skin.download;
      const m = dlUrl.match(/\/file\/d\/([^/]+)\//);
      if (m) dlUrl = `https://drive.google.com/uc?export=download&id=${m[1]}`;

      card.innerHTML = `
        <div class="card-img-wrap">
          <img src="${skin.preview}" alt="${skin.name}">
          <div class="img-fallback">NO PREVIEW</div>
        </div>
        <div class="card-body">
          <div class="card-name">${skin.name}</div>
          <div class="card-cat">${skin.category}</div>
          <a class="dl-btn" href="${dlUrl}" target="_blank" rel="noopener">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            Download
          </a>
        </div>
      `;

      // image error fallback
      const img = card.querySelector('img');
      img.addEventListener('error', () => img.setAttribute('data-error', 'true'));

      // open modal on image click only
      card.querySelector('.card-img-wrap').addEventListener('click', () => {
        modalImg.src = skin.preview;
        modalImg.alt = skin.name;
        modal.classList.add('open');
      });

      // stop download btn from opening modal
      card.querySelector('.dl-btn').addEventListener('click', e => e.stopPropagation());

      container.appendChild(card);
    });
  }

  // close modal
  document.getElementById('modalClose').addEventListener('click', closeModal);
  modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  function closeModal() {
    if (!modal.classList.contains('open')) return;
    modal.classList.remove('open');
    modal.classList.add('closing');
    modal.addEventListener('animationend', () => {
      modal.classList.remove('closing');
      modal.style.display = 'none';
    }, { once: true });
  }
</script>

</body>
</html>
